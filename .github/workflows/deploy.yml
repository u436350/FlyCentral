name: Backend CI

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import app module
        run: python -c "import main; print('main import OK')"

      - name: Smoke test login endpoint setup
        run: python -c "from main import app; print('flask app OK', bool(app))"
