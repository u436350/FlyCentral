<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlyCentral – Travel Agency Platform</title>
    <meta name="description" content="FlyCentral – Die professionelle SaaS-Plattform für Reisebüros" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlyCentral" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph für Social Sharing -->
    <meta property="og:title" content="FlyCentral – Travel Agency Platform" />
    <meta property="og:description" content="Die professionelle SaaS-Plattform für Reisebüros" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- SPA redirect from 404.html -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations()
            .then((registrations) => Promise.all(
              registrations
                .filter((registration) => registration.scope.includes('/FlyCentral/'))
                .map((registration) => registration.unregister())
            ))
            .then(() => {
              if (!('caches' in window)) return undefined;

              return caches.keys().then((keys) => Promise.all(
                keys
                  .filter((key) => key.startsWith('flycentral-'))
                  .map((key) => caches.delete(key))
              ));
            })
            .catch((err) => console.log('⚠️ SW cleanup failed:', err));
        });
      }
    </script>

  </body>
</html>
